name: Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x64
            build-cmd: bun run package:linux
            artifact: wmfx-linux

          - os: macos-14
            target: mac
            arch: x64
            build-cmd: bun run package:mac
            artifact: wmfx-mac-x64

          - os: macos-latest
            target: mac
            arch: arm64
            build-cmd: bun run package:mac
            artifact: wmfx-mac-arm64

          - os: windows-latest
            target: win
            arch: x64
            build-cmd: bun run package:win
            artifact: wmfx-win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Download mihomo binary
        run: bun run download:cores

      - name: Package & publish
        run: ${{ matrix.build-cmd }} --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-pack/
          retention-days: 30
